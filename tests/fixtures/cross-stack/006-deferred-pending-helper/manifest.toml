[bundle]
id = "006"
name = "deferred-pending-helper"
description = "Helper not bundled in the deployment; SignatureAffirmation { primitiveVerification: deferredPendingHelper }. Posture allows deferred."

[required-adapters]
adapters = []

[required-files]
formspec_response = true
wos_provenance = true
trellis_events = true
trellis_export = false
verification_receipt = false
posture_declaration = true

[expected-outcomes.formspec]
schema_valid = true
semantic_valid = true
expected_errors = []
source_of_truth_invariants = { response_id_matches_signed_payload = true, definition_url_matches = true, definition_version_matches = true, signed_at_in_signed_payload = true }

[expected-outcomes.wos]
present = true
record_kind = "signatureAffirmation"
primitive_verification_status = "deferredPendingHelper"

[expected-outcomes.trellis]
present = true
custody_hook_present = true
uca_corroborated = false
export_present = false

[cross-layer-byte-equality]
formspec_signed_payload_digest_equals_wos = true
